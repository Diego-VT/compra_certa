name: compra_certa
description: "Aplicativo CompraCerta."
publish_to: 'none'
version: 0.13.0+13

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  drift: ^2.34.0
  flutter_local_notifications: ^22.0.1
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0
  path: ^1.9.1
  path_provider: ^2.1.6
  pdf: ^3.13.0
  printing: ^5.15.0
  sqlite3_flutter_libs: ^0.6.0+eol
  shared_preferences: ^2.5.3

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.34.1+1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/roboto-regular.ttf
    - assets/fonts/roboto-bold.ttf
    - assets/fonts/roboto-license.txt
    - assets/seeds/categorias_seed_compra_certa.json
    - assets/seeds/produtos_seed_compra_certa.json
    - assets/prompts/ia_sugestoes_v1.md
